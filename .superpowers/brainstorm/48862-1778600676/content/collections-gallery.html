<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Manrope:wght@400;500;600&display=swap');

    .gallery-container {
        font-family: 'Manrope', sans-serif;
        background-color: #FAFAFA;
        color: #000000;
        padding-bottom: 8rem;
    }

    .section-header {
        padding: 8rem 4rem 4rem;
        max-width: 1440px;
        margin: 0 auto;
    }

    .section-label {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 700;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #999;
        margin-bottom: 1rem;
        display: block;
    }

    .section-title {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 800;
        font-size: 4rem;
        letter-spacing: -0.03em;
        margin: 0;
    }

    .collections-grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 2rem;
        max-width: 1440px;
        margin: 0 auto;
        padding: 0 4rem;
    }

    .product-item {
        position: relative;
        cursor: pointer;
        transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .product-item:hover {
        transform: translateY(-10px);
    }

    .product-image-wrap {
        background: #FFFFFF;
        padding: 4rem;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
    }

    .product-image {
        max-width: 100%;
        height: auto;
        filter: drop-shadow(0 20px 40px rgba(0,0,0,0.05));
        transition: transform 0.5s ease;
    }

    .product-item:hover .product-image {
        transform: scale(1.1);
    }

    .product-info {
        margin-top: 2rem;
    }

    .product-category {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #999;
        margin-bottom: 0.5rem;
        display: block;
    }

    .product-name {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 700;
        font-size: 1.25rem;
        margin: 0;
    }

    /* Asymmetric Layouts */
    .item-large { grid-column: span 7; }
    .item-small { grid-column: span 5; margin-top: 8rem; }
    .item-medium-left { grid-column: span 6; margin-top: -4rem; }
    .item-medium-right { grid-column: span 6; }

    .view-all-wrap {
        grid-column: span 12;
        display: flex;
        justify-content: center;
        margin-top: 6rem;
    }

    .view-all-link {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 800;
        font-size: 1.5rem;
        color: #000;
        text-decoration: none;
        border-bottom: 2px solid #000;
        padding-bottom: 0.5rem;
        transition: opacity 0.3s;
    }

    .view-all-link:hover {
        opacity: 0.6;
    }
</style>
